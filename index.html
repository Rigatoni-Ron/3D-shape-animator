<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Shape Animator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    background: #ff8c42;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  canvas { display: block; }

  #bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  #particleCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .cursor {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 100;
  }

  /* 8 lines that form both crosshair and corners */
  .cursor-line {
    position: absolute;
    background: rgba(255, 255, 255, 0.85);
    transition: all 0.3s cubic-bezier(0.25, 0, 0.35, 1);
    transform-origin: center;
  }

  /* Springy only when entering hover/drag */
  .cursor.hovering .cursor-line,
  .cursor.dragging .cursor-line {
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Default: crosshair — 4 arms from center */
  .cursor-line.top    { width: 1.5px; height: 9px;  left: -0.75px; top: -9px; }
  .cursor-line.bottom { width: 1.5px; height: 9px;  left: -0.75px; top: 0px; }
  .cursor-line.left   { width: 9px;   height: 1.5px; left: -9px;   top: -0.75px; }
  .cursor-line.right  { width: 9px;   height: 1.5px; left: 0px;    top: -0.75px; }
  /* Second set hidden at center initially */
  .cursor-line.top2    { width: 1.5px; height: 0px; left: -0.75px; top: 0px; opacity: 0; }
  .cursor-line.bottom2 { width: 1.5px; height: 0px; left: -0.75px; top: 0px; opacity: 0; }
  .cursor-line.left2   { width: 0px; height: 1.5px; left: 0px;     top: -0.75px; opacity: 0; }
  .cursor-line.right2  { width: 0px; height: 1.5px; left: 0px;     top: -0.75px; opacity: 0; }

  /* Hover: lines split outward and bend into corner brackets */
  .cursor.hovering .cursor-line.top    { height: 8px; left: -14px; top: -14px; }
  .cursor.hovering .cursor-line.bottom { height: 8px; left: 12.5px; top: 6px; }
  .cursor.hovering .cursor-line.left   { width: 8px;  left: -14px; top: -14px; }
  .cursor.hovering .cursor-line.right  { width: 8px;  left: 6px;   top: 12.5px; }
  /* Second set appears to complete the corners */
  .cursor.hovering .cursor-line.top2    { height: 8px; left: 12.5px; top: -14px; opacity: 1; }
  .cursor.hovering .cursor-line.bottom2 { height: 8px; left: -14px;  top: 6px; opacity: 1; }
  .cursor.hovering .cursor-line.left2   { width: 8px;  left: 6px;    top: -14px; opacity: 1; }
  .cursor.hovering .cursor-line.right2  { width: 8px;  left: -14px;  top: 12.5px; opacity: 1; }

  /* Dragging: corners tighten inward */
  .cursor.dragging .cursor-line.top    { height: 7px; left: -10px; top: -10px; }
  .cursor.dragging .cursor-line.bottom { height: 7px; left: 8.5px;  top: 3px; }
  .cursor.dragging .cursor-line.left   { width: 7px;  left: -10px; top: -10px; }
  .cursor.dragging .cursor-line.right  { width: 7px;  left: 3px;   top: 8.5px; }
  .cursor.dragging .cursor-line.top2    { height: 7px; left: 8.5px;  top: -10px; opacity: 1; }
  .cursor.dragging .cursor-line.bottom2 { height: 7px; left: -10px;  top: 3px; opacity: 1; }
  .cursor.dragging .cursor-line.left2   { width: 7px;  left: 3px;    top: -10px; opacity: 1; }
  .cursor.dragging .cursor-line.right2  { width: 7px;  left: -10px;  top: 8.5px; opacity: 1; }


</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="cursor" id="cursor">
  <div class="cursor-line top"></div>
  <div class="cursor-line bottom"></div>
  <div class="cursor-line left"></div>
  <div class="cursor-line right"></div>
  <div class="cursor-line top2"></div>
  <div class="cursor-line bottom2"></div>
  <div class="cursor-line left2"></div>
  <div class="cursor-line right2"></div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene Setup ────────────────────────────────────────────
// ─── Background Shader ──────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const gl = bgCanvas.getContext('webgl');

function resizeBg() {
  bgCanvas.width = window.innerWidth * Math.min(window.devicePixelRatio, 2);
  bgCanvas.height = window.innerHeight * Math.min(window.devicePixelRatio, 2);
  bgCanvas.style.width = window.innerWidth + 'px';
  bgCanvas.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, bgCanvas.width, bgCanvas.height);
}
resizeBg();

const bgVert = `
  attribute vec2 pos;
  void main() { gl_Position = vec4(pos, 0.0, 1.0); }
`;

const bgFrag = `
  precision highp float;
  uniform float uTime;
  uniform vec2 uResolution;
  uniform vec2 uMouse;

  // Simplex-style noise
  vec3 mod289(vec3 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec2 mod289(vec2 x) { return x - floor(x * (1.0/289.0)) * 289.0; }
  vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

  float snoise(vec2 v) {
    const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                       -0.577350269189626, 0.024390243902439);
    vec2 i = floor(v + dot(v, C.yy));
    vec2 x0 = v - i + dot(i, C.xx);
    vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
    vec4 x12 = x0.xyxy + C.xxzz;
    x12.xy -= i1;
    i = mod289(i);
    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
    m = m*m; m = m*m;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 ox = floor(x + 0.5);
    vec3 a0 = x - ox;
    m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
    vec3 g;
    g.x = a0.x * x0.x + h.x * x0.y;
    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
    return 130.0 * dot(m, g);
  }

  // Fewer octaves — flatter, less haze
  float fbm(vec2 p) {
    float f = 0.0;
    float w = 0.6;
    for (int i = 0; i < 3; i++) {
      f += w * snoise(p);
      p *= 2.0;
      w *= 0.4;
    }
    return f;
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / uResolution;
    vec2 p = uv * 2.5;

    float t = uTime * 0.12;

    // Two layers only — big flat patches with subtle variation
    float n1 = fbm(p * 0.5 + vec2(t * 0.3, t * 0.2));
    float n2 = fbm(p * 1.2 + vec2(-t * 0.4, t * 0.35));

    float combined = n1 * 0.65 + n2 * 0.35;

    // Flatten the range — less contrast between zones
    combined = combined * 0.35 + 0.55;

    // 5 saturated orange hues — rich and punchy
    vec3 c1 = vec3(0.80, 0.28, 0.04);  // deep saturated
    vec3 c2 = vec3(0.92, 0.38, 0.06);  // rich orange
    vec3 c3 = vec3(1.00, 0.46, 0.10);  // vivid orange
    vec3 c4 = vec3(1.00, 0.54, 0.16);  // warm punch
    vec3 c5 = vec3(1.00, 0.64, 0.26);  // bright accent

    vec3 col;
    if (combined < 0.3) {
      col = mix(c1, c2, combined / 0.3);
    } else if (combined < 0.5) {
      col = mix(c2, c3, (combined - 0.3) / 0.2);
    } else if (combined < 0.7) {
      col = mix(c3, c4, (combined - 0.5) / 0.2);
    } else {
      col = mix(c4, c5, (combined - 0.7) / 0.3);
    }

    // Very subtle vignette
    float vig = 1.0 - 0.1 * length(uv - 0.5);
    col *= vig;

    gl_FragColor = vec4(col, 1.0);
  }
`;

function compileBgShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const bgProg = gl.createProgram();
gl.attachShader(bgProg, compileBgShader(gl.VERTEX_SHADER, bgVert));
gl.attachShader(bgProg, compileBgShader(gl.FRAGMENT_SHADER, bgFrag));
gl.linkProgram(bgProg);
gl.useProgram(bgProg);

const bgBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, bgBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const posAttr = gl.getAttribLocation(bgProg, 'pos');
gl.enableVertexAttribArray(posAttr);
gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(bgProg, 'uTime');
const uRes = gl.getUniformLocation(bgProg, 'uResolution');
const uMouse = gl.getUniformLocation(bgProg, 'uMouse');
gl.uniform2f(uRes, bgCanvas.width, bgCanvas.height);

function renderBg(time) {
  gl.uniform1f(uTime, time);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─── Three.js Scene Setup ───────────────────────────────────
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 2.8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.domElement.id = 'particleCanvas';
document.body.appendChild(renderer.domElement);

// ─── Configuration ──────────────────────────────────────────
const PARTICLE_COUNT = 8000;
let morphDuration = 2.2; // varies per transition
const BASE_SIZE = 2.0;

const colorPalette = [
  new THREE.Color(0xf0ece8), // warm off-white
];

// ─── Shape Generators ───────────────────────────────────────
function generateCube(count) {
  const positions = [];
  for (let i = 0; i < count; i++) {
    const face = Math.floor(Math.random() * 6);
    let x, y, z;
    const s = BASE_SIZE * 0.5;
    switch(face) {
      case 0: x =  s; y = (Math.random()-0.5)*BASE_SIZE; z = (Math.random()-0.5)*BASE_SIZE; break;
      case 1: x = -s; y = (Math.random()-0.5)*BASE_SIZE; z = (Math.random()-0.5)*BASE_SIZE; break;
      case 2: y =  s; x = (Math.random()-0.5)*BASE_SIZE; z = (Math.random()-0.5)*BASE_SIZE; break;
      case 3: y = -s; x = (Math.random()-0.5)*BASE_SIZE; z = (Math.random()-0.5)*BASE_SIZE; break;
      case 4: z =  s; x = (Math.random()-0.5)*BASE_SIZE; y = (Math.random()-0.5)*BASE_SIZE; break;
      case 5: z = -s; x = (Math.random()-0.5)*BASE_SIZE; y = (Math.random()-0.5)*BASE_SIZE; break;
    }
    positions.push(x, y, z);
  }
  return new Float32Array(positions);
}

function generateSphere(count) {
  const positions = [];
  const r = BASE_SIZE * 0.55;
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
  }
  return new Float32Array(positions);
}

function generateTorus(count) {
  const positions = [];
  const R = BASE_SIZE * 0.4;
  const r = BASE_SIZE * 0.18;
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 2;
    positions.push(
      (R + r * Math.cos(phi)) * Math.cos(theta),
      (R + r * Math.cos(phi)) * Math.sin(theta),
      r * Math.sin(phi)
    );
  }
  return new Float32Array(positions);
}

function generatePyramid(count) {
  const positions = [];
  const h = BASE_SIZE * 0.7;
  const base = BASE_SIZE * 0.6;
  for (let i = 0; i < count; i++) {
    const face = Math.floor(Math.random() * 5);
    let x, y, z;
    if (face === 0) {
      x = (Math.random() - 0.5) * base * 2;
      z = (Math.random() - 0.5) * base * 2;
      y = -h / 2;
    } else {
      const t = Math.random();
      const apex = { x: 0, y: h / 2, z: 0 };
      let bx1, bz1, bx2, bz2;
      switch(face) {
        case 1: bx1 = -base; bz1 = -base; bx2 =  base; bz2 = -base; break;
        case 2: bx1 =  base; bz1 = -base; bx2 =  base; bz2 =  base; break;
        case 3: bx1 =  base; bz1 =  base; bx2 = -base; bz2 =  base; break;
        case 4: bx1 = -base; bz1 =  base; bx2 = -base; bz2 = -base; break;
      }
      const s = Math.random();
      const edgeX = bx1 + s * (bx2 - bx1);
      const edgeZ = bz1 + s * (bz2 - bz1);
      x = apex.x + t * (edgeX - apex.x);
      y = apex.y + t * (-h / 2 - apex.y);
      z = apex.z + t * (edgeZ - apex.z);
    }
    positions.push(x, y, z);
  }
  return new Float32Array(positions);
}

function generateHelix(count) {
  const positions = [];
  const turns = 4;
  const height = BASE_SIZE * 0.8;
  const radius = BASE_SIZE * 0.35;
  for (let i = 0; i < count; i++) {
    const strand = i % 2 === 0 ? 0 : Math.PI;
    const t = (i / count) * turns * Math.PI * 2;
    const y = ((i / count) - 0.5) * height * 2;
    const spread = (Math.random() - 0.5) * 0.08;
    if (Math.random() < 0.15) {
      const rungT = Math.floor(t / (Math.PI * 0.5)) * (Math.PI * 0.5);
      const lerp = Math.random();
      const x1 = radius * Math.cos(rungT);
      const z1 = radius * Math.sin(rungT);
      const x2 = radius * Math.cos(rungT + Math.PI);
      const z2 = radius * Math.sin(rungT + Math.PI);
      positions.push(
        x1 + lerp * (x2 - x1) + spread,
        y + spread,
        z1 + lerp * (z2 - z1) + spread
      );
    } else {
      positions.push(
        radius * Math.cos(t + strand) + spread,
        y + spread,
        radius * Math.sin(t + strand) + spread
      );
    }
  }
  return new Float32Array(positions);
}

function generateStar(count) {
  const positions = [];
  const outerR = BASE_SIZE * 0.6;
  const innerR = BASE_SIZE * 0.25;
  const points = 5;
  const depth = BASE_SIZE * 0.15;
  for (let i = 0; i < count; i++) {
    const z = (Math.random() - 0.5) * depth;
    const angle = Math.random() * Math.PI * 2;
    const sectorAngle = (angle % (Math.PI * 2 / points)) / (Math.PI * 2 / points);
    const t = Math.abs(sectorAngle - 0.5) * 2;
    const r = innerR + t * (outerR - innerR);
    const rRand = r * (0.85 + Math.random() * 0.15);
    positions.push(
      rRand * Math.cos(angle),
      rRand * Math.sin(angle),
      z
    );
  }
  return new Float32Array(positions);
}

function generateHeart(count) {
  const positions = [];
  const scale = BASE_SIZE * 0.045;
  for (let i = 0; i < count; i++) {
    const u = Math.random() * Math.PI * 2;
    const v = Math.random() * Math.PI;
    const x = 16 * Math.pow(Math.sin(u), 3);
    const y = 13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u);
    const z = (Math.random() - 0.5) * 8 * Math.sin(v);
    const surfaceBias = 0.85 + Math.random() * 0.15;
    positions.push(
      x * scale * surfaceBias,
      y * scale * surfaceBias,
      z * scale * surfaceBias
    );
  }
  return new Float32Array(positions);
}

function generateBitcoin(count) {
  const positions = [];
  const S = BASE_SIZE * 0.5;
  const thick = 0.04; // thickness of strokes
  const depth = S * 0.35; // 3D depth

  // Helper: add particle on a line with 3D depth
  function line3D(x1, y1, x2, y2, n) {
    for (let i = 0; i < n; i++) {
      const t = Math.random();
      const z = (Math.random() - 0.5) * depth;
      positions.push(
        (x1 + (x2 - x1) * t + (Math.random() - 0.5) * thick) * S,
        (y1 + (y2 - y1) * t + (Math.random() - 0.5) * thick) * S,
        z
      );
    }
  }

  // Helper: add particle on an arc with 3D depth
  function arc3D(cx, cy, r, startAngle, endAngle, n) {
    for (let i = 0; i < n; i++) {
      const a = startAngle + Math.random() * (endAngle - startAngle);
      const z = (Math.random() - 0.5) * depth;
      positions.push(
        (cx + r * Math.cos(a) + (Math.random() - 0.5) * thick) * S,
        (cy + r * Math.sin(a) + (Math.random() - 0.5) * thick) * S,
        z
      );
    }
  }

  const perSegment = Math.floor(count / 12);

  // Left vertical stroke of B
  line3D(-0.35, -0.8, -0.35, 0.8, perSegment);

  // Top horizontal bars
  line3D(-0.35, 0.8, 0.05, 0.8, perSegment);    // top bar
  line3D(-0.35, 0.0, 0.1, 0.0, perSegment);      // middle bar
  line3D(-0.35, -0.8, 0.05, -0.8, perSegment);   // bottom bar

  // Upper bump of B (arc from top to middle)
  arc3D(0.05, 0.4, 0.4, -Math.PI/2, Math.PI/2, perSegment * 2);

  // Lower bump of B (slightly wider)
  arc3D(0.1, -0.4, 0.4, -Math.PI/2, Math.PI/2, perSegment * 2);

  // Two vertical strike-through lines extending above and below
  line3D(-0.15, 0.8, -0.15, 1.0, perSegment);
  line3D(-0.15, -0.8, -0.15, -1.0, perSegment);
  line3D(0.05, 0.8, 0.05, 1.0, perSegment);
  line3D(0.05, -0.8, 0.05, -1.0, perSegment);

  // Fill remaining
  while (positions.length / 3 < count) {
    const idx = Math.floor(Math.random() * positions.length / 3) * 3;
    positions.push(
      positions[idx] + (Math.random() - 0.5) * 0.02,
      positions[idx+1] + (Math.random() - 0.5) * 0.02,
      positions[idx+2] + (Math.random() - 0.5) * depth * 0.5
    );
  }

  return new Float32Array(positions.slice(0, count * 3));
}

const shapeGenerators = {
  cube: generateCube,
  sphere: generateSphere,
  torus: generateTorus,
  pyramid: generatePyramid,
  helix: generateHelix,
  star: generateStar,
  heart: generateHeart,
  bitcoin: generateBitcoin,
};

// ─── Particle System ────────────────────────────────────────
const geometry = new THREE.BufferGeometry();
const currentPositions = generateSphere(PARTICLE_COUNT);
const targetPositions = new Float32Array(currentPositions);
const startPositions = new Float32Array(currentPositions);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const randoms = new Float32Array(PARTICLE_COUNT); // random offset per particle

// Initialize colors and sizes
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
  colors[i * 3] = color.r;
  colors[i * 3 + 1] = color.g;
  colors[i * 3 + 2] = color.b;
  sizes[i] = 1.5;
  randoms[i] = Math.random();
}

geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Custom shader material for soft round particles
const particleMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uPixelRatio: { value: renderer.getPixelRatio() },
    uTime: { value: 0.0 },
  },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vDepth;
    varying float vGlow;
    uniform float uPixelRatio;
    uniform float uTime;

    // Simple 3D noise for glow hotspots
    vec3 mod289(vec3 x) { return x - floor(x / 289.0) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x / 289.0) * 289.0; }
    vec4 perm(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }

    float noise3D(vec3 p) {
      vec3 a = floor(p);
      vec3 d = p - a;
      d = d * d * (3.0 - 2.0 * d);
      vec4 b = a.xxyy + vec4(0.0, 1.0, 0.0, 1.0);
      vec4 k1 = perm(b.xyxy);
      vec4 k2 = perm(k1.xyxy + b.zzww);
      vec4 c = k2 + a.zzzz;
      vec4 k3 = perm(c);
      vec4 k4 = perm(c + 1.0);
      vec4 o1 = fract(k3 * (1.0 / 41.0));
      vec4 o2 = fract(k4 * (1.0 / 41.0));
      vec4 o3 = o2 * d.z + o1 * (1.0 - d.z);
      vec2 o4 = o3.yw * d.x + o3.xz * (1.0 - d.x);
      return o4.y * d.y + o4.x * (1.0 - d.y);
    }

    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      vDepth = -mvPosition.z;

      // Glow hotspots: noise sampled at world position, drifting over time
      float n1 = noise3D(position * 1.8 + vec3(uTime * 0.3, uTime * 0.2, uTime * -0.15));
      float n2 = noise3D(position * 3.5 + vec3(-uTime * 0.2, uTime * 0.4, uTime * 0.25));
      float glow = smoothstep(0.45, 0.75, n1) * 0.7 + smoothstep(0.5, 0.8, n2) * 0.3;

      vGlow = glow;

      // Glow particles get bigger
      float glowSize = size + glow * 4.0;
      gl_PointSize = glowSize * uPixelRatio;
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vDepth;
    varying float vGlow;

    void main() {
      vec2 center = gl_PointCoord - vec2(0.5);
      float dist = length(center);
      if (dist > 0.5) discard;

      // Glowing particles get a soft falloff, normal ones stay crisp
      float softness = mix(0.4, 0.1, vGlow);
      float alpha = smoothstep(0.5, softness, dist);

      // Depth fade
      float depthFade = smoothstep(6.0, 2.0, vDepth) * 0.4 + 0.6;

      // Boost brightness in glow zones
      vec3 col = mix(vColor, vec3(1.0), vGlow * 0.5);

      // Glow particles are more opaque at edges for bloom feel
      float glowAlpha = mix(alpha, alpha * 0.6 + 0.4, vGlow);

      gl_FragColor = vec4(col, glowAlpha * depthFade);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.NormalBlending,
});

const particles = new THREE.Points(geometry, particleMaterial);
scene.add(particles);

// ─── Morphing State ─────────────────────────────────────────
let morphing = false;
let morphProgress = 0;
let currentShape = 'sphere';
const shapeOrder = ['sphere', 'torus', 'pyramid', 'bitcoin'];
let shapeIndex = 0;

// Per-particle data
const midOffsets = new Float32Array(PARTICLE_COUNT * 3);
const delays = new Float32Array(PARTICLE_COUNT);
const swirlData = new Float32Array(PARTICLE_COUNT);
let morphStyle = 0;

// Profiles: faster, punchier, less stagger so everything reacts immediately
const profiles = {
  toTorus:   { duration: 1.4, expand: [0.4, 0.9], scatter: 0.5, swirl: [0.5, 2.0], stagger: 'radial',  staggerAmt: 0.12 },
  toPyramid: { duration: 1.1, expand: [0.2, 0.6], scatter: 0.7, swirl: [1.5, 4.0], stagger: 'vertical', staggerAmt: 0.15 },
  toBitcoin: { duration: 1.2, expand: [0.3, 0.5], scatter: 0.3, swirl: [0.3, 1.5], stagger: 'vertical', staggerAmt: 0.10 },
  toSphere:  { duration: 1.3, expand: [0.6, 1.4], scatter: 0.6, swirl: [1.0, 3.0], stagger: 'angular',  staggerAmt: 0.12 },
};

function getProfile(name) {
  return profiles['to' + name.charAt(0).toUpperCase() + name.slice(1)] || profiles.toSphere;
}

function cycleShape() {
  if (morphing) return;
  shapeIndex = (shapeIndex + 1) % shapeOrder.length;
  const shapeName = shapeOrder[shapeIndex];
  const p = getProfile(shapeName);
  morphDuration = p.duration;

  const newPositions = shapeGenerators[shapeName](PARTICLE_COUNT);
  startPositions.set(currentPositions);
  targetPositions.set(newPositions);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const sx = startPositions[i3], sy = startPositions[i3+1], sz = startPositions[i3+2];
    const tx = targetPositions[i3], ty = targetPositions[i3+1], tz = targetPositions[i3+2];

    // Direction from start to target — push the arc perpendicular to travel
    const dx = tx - sx, dy = ty - sy, dz = tz - sz;
    const travelDist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.001;

    // Cross product with a varying axis for perpendicular push
    const seed = randoms[i];
    const ax = Math.sin(seed * 50), ay = Math.cos(seed * 30), az = Math.sin(seed * 70);
    let px = dy*az - dz*ay, py = dz*ax - dx*az, pz = dx*ay - dy*ax;
    const pLen = Math.sqrt(px*px + py*py + pz*pz) + 0.001;
    px /= pLen; py /= pLen; pz /= pLen;

    const expand = p.expand[0] + seed * (p.expand[1] - p.expand[0]);
    const scatterVal = (randoms[(i*7)%PARTICLE_COUNT] - 0.5) * p.scatter;

    midOffsets[i3]     = px * expand * travelDist + scatterVal;
    midOffsets[i3 + 1] = py * expand * travelDist + scatterVal;
    midOffsets[i3 + 2] = pz * expand * travelDist + scatterVal;

    // Minimal stagger — most particles start almost immediately
    let bias;
    if (p.stagger === 'radial') {
      bias = Math.sqrt(sx*sx + sy*sy + sz*sz) / 2.0;
    } else if (p.stagger === 'vertical') {
      bias = 1.0 - (sy + 1.5) / 3.0;
    } else {
      bias = (Math.atan2(sz, sx) + Math.PI) / (Math.PI * 2);
    }
    delays[i] = bias * p.staggerAmt + seed * 0.05;

    swirlData[i] = (seed > 0.5 ? 1 : -1) * (p.swirl[0] + seed * (p.swirl[1] - p.swirl[0]));
  }

  morphStyle = shapeIndex;
  morphProgress = 0;
  morphing = true;
  currentShape = shapeName;
}

// Easing — all fast-start curves, no slow wind-up
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -12 * t); }
function easeOutBack(t, c) { c = c || 1.7; return 1 + c * Math.pow(t-1, 3) + (c-1) * Math.pow(t-1, 2); }
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t - 0.05) * (2 * Math.PI) / 0.25) + 1;
}

// ─── Drag-to-Spin Interaction ───────────────────────────────
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let dragTotalDist = 0;
let rotVelX = 0, rotVelY = 0;
let rotX = 0, rotY = 0;
let prevMouseX = 0, prevMouseY = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragTotalDist = 0;
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouseX;
  const dy = e.clientY - prevMouseY;
  dragTotalDist += Math.abs(dx) + Math.abs(dy);
  rotVelY = dx * 0.005;
  rotVelX = dy * 0.005;
  prevMouseX = e.clientX;
  prevMouseY = e.clientY;
});

window.addEventListener('mouseup', (e) => {
  if (isDragging && dragTotalDist < 5) {
    cycleShape();
  }
  isDragging = false;
});

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  isDragging = true;
  const t = e.touches[0];
  dragStartX = t.clientX;
  dragStartY = t.clientY;
  dragTotalDist = 0;
  prevMouseX = t.clientX;
  prevMouseY = t.clientY;
});

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const t = e.touches[0];
  const dx = t.clientX - prevMouseX;
  const dy = t.clientY - prevMouseY;
  dragTotalDist += Math.abs(dx) + Math.abs(dy);
  rotVelY = dx * 0.005;
  rotVelX = dy * 0.005;
  prevMouseX = t.clientX;
  prevMouseY = t.clientY;
});

window.addEventListener('touchend', () => {
  if (isDragging && dragTotalDist < 5) {
    cycleShape();
  }
  isDragging = false;
});

// ─── Animation Loop ─────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  // Morph animation
  if (morphing) {
    morphProgress += dt / morphDuration;
    if (morphProgress >= 1) {
      morphProgress = 1;
      morphing = false;
    }

    const pos = geometry.attributes.position.array;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;

      // Minimal delay — everything kicks off fast
      const raw = Math.min(Math.max((morphProgress - delays[i]) / (1.0 - delays[i]), 0), 1);

      // Fast-out easing varies per shape for character
      let t;
      if (morphStyle === 1) {
        t = easeOutExpo(raw);         // torus: explosive start, smooth glide
      } else if (morphStyle === 2) {
        t = easeOutElastic(raw);      // pyramid: punchy with bounce
      } else if (morphStyle === 3) {
        t = easeOutBack(raw, 2.0);    // bitcoin: overshoot snap
      } else {
        t = easeOutQuart(raw);        // sphere: powerful but clean
      }

      const sx = startPositions[i3], sy = startPositions[i3+1], sz = startPositions[i3+2];
      const tx = targetPositions[i3], ty = targetPositions[i3+1], tz = targetPositions[i3+2];

      // Arc intensity peaks at midpoint of flight
      const arc = Math.sin(raw * Math.PI);

      // Simple lerp + perpendicular arc push
      const lx = sx + (tx - sx) * t + midOffsets[i3] * arc;
      const ly = sy + (ty - sy) * t + midOffsets[i3+1] * arc;
      const lz = sz + (tz - sz) * t + midOffsets[i3+2] * arc;

      // Swirl rotation — strongest at midpoint
      const swirlAngle = arc * swirlData[i];
      const cosS = Math.cos(swirlAngle), sinS = Math.sin(swirlAngle);

      pos[i3]     = lx * cosS + lz * sinS;
      pos[i3 + 1] = ly;
      pos[i3 + 2] = -lx * sinS + lz * cosS;
    }
    geometry.attributes.position.needsUpdate = true;
  }

  // Gentle floating animation when idle
  if (!morphing) {
    const pos = geometry.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      const baseX = targetPositions[i3] || currentPositions[i3];
      const baseY = targetPositions[i3+1] || currentPositions[i3+1];
      const baseZ = targetPositions[i3+2] || currentPositions[i3+2];
      const r = randoms[i];
      pos[i3]     = baseX + Math.sin(time * 0.5 + r * 10) * 0.015;
      pos[i3 + 1] = baseY + Math.cos(time * 0.4 + r * 20) * 0.015;
      pos[i3 + 2] = baseZ + Math.sin(time * 0.6 + r * 15) * 0.015;
    }
    geometry.attributes.position.needsUpdate = true;
  }

  // Apply drag rotation with momentum
  if (!isDragging) {
    rotVelX *= 0.97; // friction
    rotVelY *= 0.97;
  }
  rotX += rotVelX;
  rotY += rotVelY;

  // Gentle auto-rotation when not being touched
  if (!isDragging && Math.abs(rotVelY) < 0.0005) {
    rotY += 0.002;
  }

  particles.rotation.x = rotX;
  particles.rotation.y = rotY;

  // Update particle glow time
  particleMaterial.uniforms.uTime.value = time;

  // Render background shader then particles
  renderBg(time);
  renderer.render(scene, camera);
}

animate();

// ─── Resize ─────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
  resizeBg();
  gl.useProgram(bgProg);
  gl.uniform2f(uRes, bgCanvas.width, bgCanvas.height);
});

// ─── Custom Cursor ──────────────────────────────────────────
const cursorEl = document.getElementById('cursor');
let cursorX = -100, cursorY = -100;
let cursorVisible = false;

// Raycaster for hover detection
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.15;
const mouse2D = new THREE.Vector2();

window.addEventListener('mousemove', (e) => {
  cursorX = e.clientX;
  cursorY = e.clientY;
  cursorEl.style.transform = `translate(${cursorX}px, ${cursorY}px)`;


  if (!cursorVisible) {
    cursorEl.style.opacity = '1';
    cursorVisible = true;
  }

  // Hit test against particle bounding sphere
  mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObject(particles);
  if (hits.length > 0) {
    cursorEl.classList.add('hovering');
  } else {
    cursorEl.classList.remove('hovering');
  }
});

renderer.domElement.addEventListener('mousedown', () => {
  cursorEl.classList.add('dragging');
});

window.addEventListener('mouseup', () => {
  cursorEl.classList.remove('dragging');
});

window.addEventListener('mouseleave', () => {
  cursorEl.style.opacity = '0';
  cursorVisible = false;
});

</script>
</body>
</html>
